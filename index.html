<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShiftDeck Support</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffdf9;
      --text: #1f1d1a;
      --muted: #6b6258;
      --line: #ded7cd;
      --accent: #125b50;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: radial-gradient(circle at top, #fff7ec 0%, var(--bg) 52%, #efe9de 100%);
      color: var(--text);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(54, 40, 20, 0.08);
    }
    h1, h2 { margin: 0 0 12px; }
    p, li { line-height: 1.7; }
    .muted { color: var(--muted); }
    a { color: var(--accent); }
    ul { padding-left: 20px; }
    .links a {
      display: inline-block;
      margin-right: 16px;
      margin-top: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>ShiftDeck</h1>
      <p class="muted">离线优先的轮班排班、提醒、小组件与 Apple Calendar 导出工具。</p>
      <div class="links">
        <a href="/support.html">技术支持</a>
        <a href="/privacy.html">隐私政策</a>
      </div>
      <h2>应用说明</h2>
      <ul>
        <li>支持 2-2-3、DuPont、Pitman 等常见轮班模板。</li>
        <li>支持本地编辑班次、取消班、半班、加班、替班与自定义事件。</li>
        <li>支持提醒、小组件、备份恢复和 Apple Calendar 导出。</li>
      </ul>
    </div>
  </main>
</body>
</html>
